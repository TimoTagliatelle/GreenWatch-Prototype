<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="RookieRecords - Friends Doing Climbin Stuff Together">
    <!-- Responsives Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RookieRecords - Gallery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <style>
      /* ---------------------------------------------------
         Gallery-specific styles. Everything is namespaced
         under .gallery-page so it can't clash with style.css
      --------------------------------------------------- */
      .gallery-page {
        padding: 40px 0 80px;
      }

      .year-block {
        margin-bottom: 96px;
      }

      .year-label {
        font-family: "Bagel Fat One", cursive;
        color: #E4AB30;
        font-size: clamp(28px, 4vw, 44px);
        text-align: center;
        margin: 0 0 8px;
        letter-spacing: 1px;
      }

      .year-sub {
        text-align: center;
        color: #7a7a7a;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 36px;
      }

      /* ---------- Wheel carousel ---------- */
      .wheel {
        position: relative;
        width: 100%;
        max-width: 900px;
        height: 320px;
        margin: 0 auto;
        overflow: hidden;
      }

      .wheel-track {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .wheel-item {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 220px;
        height: 220px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.45s ease, opacity 0.45s ease, filter 0.45s ease;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .wheel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .wheel-item.is-center {
        cursor: zoom-in;
      }

      /* ---------- Arrows ---------- */
      .wheel-arrow {
        background: none;
        border: none;
        color: #E4AB30;
        font-size: 32px;
        line-height: 1;
        padding: 8px 18px;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 5;
        flex-shrink: 0;
      }

      .wheel-arrow:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      .wheel-arrow:focus-visible {
        outline: 2px solid #E4AB30;
        outline-offset: 2px;
      }

      .wheel-row {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ---------- Lightbox ---------- */
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 40px;
      }

      .lightbox.is-open {
        display: flex;
      }

      .lightbox img {
        max-width: 90vw;
        max-height: 85vh;
        object-fit: contain;
        border-radius: 4px;
      }

      .lightbox-close {
        position: absolute;
        top: 24px;
        right: 32px;
        background: none;
        border: none;
        color: #E4AB30;
        font-size: 36px;
        line-height: 1;
        cursor: pointer;
      }

      .lightbox-close:hover {
        opacity: 0.8;
      }

      @media (max-width: 700px) {
        .wheel { height: 220px; }
        .wheel-item { width: 150px; height: 150px; }
        .wheel-arrow { font-size: 24px; padding: 4px 8px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-logo">
        <a href="index.html">
          <img class="img-fluid" src="Logo3.png" alt="RR Logo">
        </a>
      </div>
      <div>
        <nav class="header-nav">
          <ul class="d-flex align-items-center gap-5">
            <li><a href="SoloSents.html">SoloSents</a></li>
            <li><a href="CrewTapes.html">CrewTapes</a></li>
            <li><a href="Gallery.html" class="active">Gallery</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="gallery-page">
      <div id="years-container">
        <!-- Jahres-Bloecke werden per JS aus GALLERY_DATA gerendert -->
      </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="Schliessen">&times;</button>
      <img id="lightbox-img" src="" alt="">
    </div>

    <script>
      /* ---------------------------------------------------------
         DATENQUELLE
         Ein Eintrag pro Jahr. "images" ist die Liste der Dateien.
         Neues Jahr hinzufuegen = neues Objekt in dieses Array.
         Reihenfolge im Array bestimmt die Reihenfolge auf der Seite.
      --------------------------------------------------------- */
      const GALLERY_DATA = [
        {
          year: "2026",
          images: [
            "gallery/2026_01.jpeg",
            "gallery/2026_02.jpeg",
            "gallery/2026_03.jpeg",
            "gallery/2026_04.jpeg",
            "gallery/2026_05.jpeg",
            "gallery/2026_06.jpeg",
            "gallery/2026_07.jpeg",
            "gallery/2026_08.jpeg",
            "gallery/2026_09.jpeg",
            "gallery/2026_10.jpeg"
          ]
        }
        // Beispiel fuer ein weiteres Jahr:
        // {
        //   year: "2025",
        //   images: ["gallery/2025_01.jpeg", "gallery/2025_02.jpeg", ...]
        // },
      ];

      const container = document.getElementById("years-container");
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxClose = document.getElementById("lightbox-close");

      function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt;
        lightbox.classList.add("is-open");
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightboxImg.src = "";
      }

      lightboxClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      // Layout-Werte fuer die Wheel-Positionen relativ zur Mitte (index-Abstand)
      // offset 0 = Zentrum, +-1, +-2 = Nachbarn
      const WHEEL_LAYOUT = {
        0: { x: 0,    scale: 1,   opacity: 1,    z: 5 },
        1: { x: 190,  scale: 0.62, opacity: 0.55, z: 4 },
        "-1": { x: -190, scale: 0.62, opacity: 0.55, z: 4 },
        2: { x: 320,  scale: 0.4,  opacity: 0.25, z: 3 },
        "-2": { x: -320, scale: 0.4, opacity: 0.25, z: 3 }
      };

      function buildWheel(yearData, yearIndex) {
        const block = document.createElement("div");
        block.className = "year-block";

        const label = document.createElement("h2");
        label.className = "year-label";
        label.textContent = yearData.year;
        block.appendChild(label);

        const sub = document.createElement("p");
        sub.className = "year-sub";
        sub.textContent = yearData.images.length + " fotos";
        block.appendChild(sub);

        const row = document.createElement("div");
        row.className = "wheel-row";

        const prevBtn = document.createElement("button");
        prevBtn.className = "wheel-arrow";
        prevBtn.setAttribute("aria-label", "Vorheriges Foto");
        prevBtn.innerHTML = "&#8249;";

        const wheel = document.createElement("div");
        wheel.className = "wheel";
        const track = document.createElement("div");
        track.className = "wheel-track";
        wheel.appendChild(track);

        const nextBtn = document.createElement("button");
        nextBtn.className = "wheel-arrow";
        nextBtn.setAttribute("aria-label", "Naechstes Foto");
        nextBtn.innerHTML = "&#8250;";

        row.appendChild(prevBtn);
        row.appendChild(wheel);
        row.appendChild(nextBtn);
        block.appendChild(row);

        let centerIndex = 0;
        const total = yearData.images.length;

        function render() {
          track.innerHTML = "";
          for (let i = 0; i < total; i++) {
            // kuerzeste Distanz auf dem Ring berechnen
            let diff = i - centerIndex;
            if (diff > total / 2) diff -= total;
            if (diff < -total / 2) diff += total;

            if (Math.abs(diff) > 2) continue; // nur +-2 Nachbarn rendern

            const layout = WHEEL_LAYOUT[diff];
            const item = document.createElement("div");
            item.className = "wheel-item" + (diff === 0 ? " is-center" : "");
            item.style.transform =
              "translate(-50%, -50%) translateX(" + layout.x + "px) scale(" + layout.scale + ")";
            item.style.opacity = layout.opacity;
            item.style.zIndex = layout.z;

            const img = document.createElement("img");
            img.src = yearData.images[i];
            img.alt = yearData.year + " Foto " + (i + 1);
            item.appendChild(img);

            item.addEventListener("click", () => {
              if (diff === 0) {
                openLightbox(yearData.images[i], img.alt);
              } else {
                centerIndex = i;
                render();
              }
            });

            track.appendChild(item);
          }
        }

        prevBtn.addEventListener("click", () => {
          centerIndex = (centerIndex - 1 + total) % total;
          render();
        });

        nextBtn.addEventListener("click", () => {
          centerIndex = (centerIndex + 1) % total;
          render();
        });

        render();
        return block;
      }

      GALLERY_DATA.forEach((yearData, idx) => {
        container.appendChild(buildWheel(yearData, idx));
      });
    </script>
  </body>
</html>
