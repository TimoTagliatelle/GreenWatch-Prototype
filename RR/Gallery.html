<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="RookieRecords - Friends Doing Climbin Stuff Together">
    <!-- Responsives Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RookieRecords - Gallery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <style>
      /* ---------------------------------------------------
         Gallery-specific styles. Everything is namespaced
         under .gallery-page so it can't clash with style.css
      --------------------------------------------------- */
      .gallery-page {
        padding: 40px 0 80px;
      }

      .year-block {
        margin-bottom: 96px;
      }

      .year-label {
        font-family: "Bagel Fat One", cursive;
        color: #E4AB30;
        font-size: clamp(28px, 4vw, 44px);
        text-align: center;
        margin: 0 0 8px;
        letter-spacing: 1px;
      }

      .year-sub {
        text-align: center;
        color: #7a7a7a;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 36px;
      }

      /* ---------- Wheel carousel ---------- */
      .wheel {
        position: relative;
        width: 100%;
        max-width: 900px;
        height: 320px;
        margin: 0 auto;
        /* kein overflow:hidden mehr - die Pfeile duerfen ausserhalb
           der einzelnen Bilder sitzen, geclippt wird nur pro Bild */
      }

      .wheel-track {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .wheel-item {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 220px;
        height: 220px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.45s ease, opacity 0.45s ease, filter 0.45s ease;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .wheel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .wheel-item.is-center {
        cursor: zoom-in;
      }

      /* ---------- Wheel-Pfeile ----------
         Werden per JS ueber --arrow-offset direkt neben das
         kleinste/ausgeblasste Randbild (Offset 2) positioniert. */
      .wheel-arrow {
        position: absolute;
        top: 50%;
        left: 50%;
        background: none;
        border: none;
        color: #E4AB30;
        font-size: 30px;
        line-height: 1;
        padding: 6px 10px;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 6;
      }

      .wheel-arrow-prev {
        transform: translate(-50%, -50%) translateX(calc(-1 * var(--arrow-offset, 380px)));
      }

      .wheel-arrow-next {
        transform: translate(-50%, -50%) translateX(var(--arrow-offset, 380px));
      }

      .wheel-arrow:hover {
        opacity: 1;
      }

      .wheel-arrow-prev:hover {
        transform: translate(-50%, -50%) translateX(calc(-1 * var(--arrow-offset, 380px))) scale(1.15);
      }

      .wheel-arrow-next:hover {
        transform: translate(-50%, -50%) translateX(var(--arrow-offset, 380px)) scale(1.15);
      }

      .wheel-arrow:focus-visible {
        outline: 2px solid #E4AB30;
        outline-offset: 2px;
      }

      /* ---------- Lightbox ---------- */
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 40px;
      }

      .lightbox.is-open {
        display: flex;
      }

      .lightbox-stage {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        max-width: 92vw;
      }

      .lightbox img {
        max-width: 80vw;
        max-height: 85vh;
        object-fit: contain;
        border-radius: 4px;
      }

      .lightbox-nav {
        background: none;
        border: none;
        color: #E4AB30;
        font-size: 44px;
        line-height: 1;
        padding: 8px 12px;
        cursor: pointer;
        opacity: 0.75;
        transition: opacity 0.2s ease, transform 0.2s ease;
        flex-shrink: 0;
      }

      .lightbox-nav:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      .lightbox-close {
        position: absolute;
        top: 24px;
        right: 32px;
        background: none;
        border: none;
        color: #E4AB30;
        font-size: 36px;
        line-height: 1;
        cursor: pointer;
      }

      .lightbox-close:hover {
        opacity: 0.8;
      }

      /* Fallback-Fix fuers Nav-Menue (SoloSents / CrewTapes / Gallery),
         falls style.css noch nicht mit demselben Fix aktualisiert wurde.
         Bootstrap generiert .gap-5 mit !important, daher muss hier
         ebenfalls !important gesetzt werden. */
      @media (max-width: 768px) {
        .header-nav ul.d-flex {
          gap: 14px !important;
          row-gap: 8px !important;
          flex-wrap: wrap !important;
        }
      }

      @media (max-width: 700px) {
        .wheel { height: 220px; overflow: hidden; }
        .wheel-item { width: 150px; height: 150px; }

        /* Pfeile werden auf Mobile nicht mehr relativ zum aeussersten
           (kleinsten) Bild positioniert - das schoss frueher weit ueber
           den sichtbaren Bereich hinaus. Stattdessen sitzen sie fest
           am linken/rechten Rand des Wheels und bleiben so immer ohne
           Scrollen erreichbar. */
        .wheel-arrow {
          font-size: 26px;
          padding: 6px 9px;
          background: rgba(0, 0, 0, 0.4);
          border-radius: 50%;
        }
        .wheel-arrow-prev {
          left: 4px;
          transform: translateY(-50%);
        }
        .wheel-arrow-next {
          left: auto;
          right: 4px;
          transform: translateY(-50%);
        }
        .wheel-arrow-prev:hover,
        .wheel-arrow-prev:active {
          transform: translateY(-50%) scale(1.12);
        }
        .wheel-arrow-next:hover,
        .wheel-arrow-next:active {
          transform: translateY(-50%) scale(1.12);
        }

        .lightbox-stage { gap: 8px; }
        .lightbox-nav { font-size: 30px; padding: 4px 6px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-logo">
        <a href="index.html">
          <img class="img-fluid" src="Logo3.png" alt="RR Logo">
        </a>
      </div>
      <div>
        <nav class="header-nav">
          <ul class="d-flex align-items-center gap-5">
            <li><a href="SoloSents.html">SoloSents</a></li>
            <li><a href="CrewTapes.html">CrewTapes</a></li>
            <li><a href="Gallery.html" class="active">Gallery</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="gallery-page">
      <div id="years-container">
        <!-- Jahres-Bloecke werden per JS aus GALLERY_DATA gerendert -->
      </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="Schliessen">&times;</button>
      <div class="lightbox-stage">
        <button class="lightbox-nav" id="lightbox-prev" aria-label="Vorheriges Foto">&#8249;</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav" id="lightbox-next" aria-label="Naechstes Foto">&#8250;</button>
      </div>
    </div>

    <script>
      /* ---------------------------------------------------------
         DATENQUELLE
         Ein Eintrag pro Jahr. "images" ist die Liste der Dateien.
         Neues Jahr hinzufuegen = neues Objekt in dieses Array.
         Reihenfolge im Array bestimmt die Reihenfolge auf der Seite.
      --------------------------------------------------------- */
      const GALLERY_DATA = [
        {
          year: "2026",
          images: [
            "gallery/2026_01.jpeg",
            "gallery/2026_02.jpeg",
            "gallery/2026_03.jpeg",
            "gallery/2026_04.jpeg",
            "gallery/2026_05.jpeg",
            "gallery/2026_06.jpeg",
            "gallery/2026_07.jpeg",
            "gallery/2026_08.jpeg",
            "gallery/2026_09.jpeg",
            "gallery/2026_10.jpeg",
            "gallery/2026_11.jpeg",
            "gallery/2026_12.jpeg",
            "gallery/2026_13.jpeg",
            "gallery/2026_14.jpeg",
            "gallery/2026_15.jpeg"
          ]
        },
        // Beispiel fuer ein weiteres Jahr:
        // {
        //   year: "2025",
        //   images: ["gallery/2025_01.jpeg", "gallery/2025_02.jpeg", ...]
        // },
        {
          year: "2025",
          images: [
            "gallery/2025_01.jpeg",
            "gallery/2025_02.jpeg",
            "gallery/2025_03.jpeg",
            "gallery/2025_04.jpeg",
            "gallery/2025_05.jpeg",
            "gallery/2025_06.jpeg",
            "gallery/2025_07.jpeg",
            "gallery/2025_08.jpeg",
            "gallery/2025_09.jpeg",
            "gallery/2025_10.jpeg",
            "gallery/2025_11.jpeg",
            "gallery/2025_12.jpeg",
            "gallery/2025_13.jpeg",
            "gallery/2025_14.jpeg",
            "gallery/2025_15.jpeg"
          ]
        },
        {
          year: "2024",
          images: [
            "gallery/2024_01.jpg",
            "gallery/2024_02.jpg",
            "gallery/2024_03.jpg",
            "gallery/2024_04.jpg",
            "gallery/2024_05.jpg",
            "gallery/2024_06.jpg",
            "gallery/2024_07.jpg",
            "gallery/2024_08.jpg",
            "gallery/2024_09.jpg",
            "gallery/2024_10.jpg",
            "gallery/2024_11.jpg",
            "gallery/2024_12.jpg",
            "gallery/2024_13.jpg",
            "gallery/2024_14.jpg",
            "gallery/2024_15.jpg"
          ]
        }
      ];

      const container = document.getElementById("years-container");
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxClose = document.getElementById("lightbox-close");
      const lightboxPrev = document.getElementById("lightbox-prev");
      const lightboxNext = document.getElementById("lightbox-next");

      // Haelt fest, welches Jahr/Bild gerade in der Lightbox offen ist,
      // damit die Pfeile dort weiterblaettern koennen.
      let activeLightbox = null; // { yearData, index, syncWheel }

      function updateLightboxImage() {
        if (!activeLightbox) return;
        const { yearData, index } = activeLightbox;
        lightboxImg.src = yearData.images[index];
        lightboxImg.alt = yearData.year + " Foto " + (index + 1);
      }

      function openLightbox(yearData, index, syncWheel) {
        activeLightbox = { yearData, index, syncWheel };
        updateLightboxImage();
        lightbox.classList.add("is-open");
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightboxImg.src = "";
        activeLightbox = null;
      }

      function stepLightbox(dir) {
        if (!activeLightbox) return;
        const total = activeLightbox.yearData.images.length;
        activeLightbox.index = (activeLightbox.index + dir + total) % total;
        updateLightboxImage();
        // Wheel im Hintergrund mitdrehen, damit es beim Schliessen
        // wieder zum zuletzt betrachteten Bild passt.
        activeLightbox.syncWheel(activeLightbox.index);
      }

      lightboxClose.addEventListener("click", closeLightbox);
      lightboxPrev.addEventListener("click", () => stepLightbox(-1));
      lightboxNext.addEventListener("click", () => stepLightbox(1));
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (!lightbox.classList.contains("is-open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") stepLightbox(-1);
        if (e.key === "ArrowRight") stepLightbox(1);
      });

      // Layout-Werte fuer die Wheel-Positionen relativ zur Mitte (index-Abstand)
      // offset 0 = Zentrum, +-1, +-2 = Nachbarn
      const WHEEL_LAYOUT_DESKTOP = {
        0: { x: 0,    scale: 1,   opacity: 1,    z: 5 },
        1: { x: 190,  scale: 0.62, opacity: 0.55, z: 4 },
        "-1": { x: -190, scale: 0.62, opacity: 0.55, z: 4 },
        2: { x: 320,  scale: 0.4,  opacity: 0.25, z: 3 },
        "-2": { x: -320, scale: 0.4, opacity: 0.25, z: 3 }
      };

      // Kompaktere Positionen fuer schmale Bildschirme, damit die
      // aeusseren Bilder nicht mehr ueber den sichtbaren Bereich
      // hinausragen (das Wheel bekommt dort zusaetzlich overflow:hidden).
      const WHEEL_LAYOUT_MOBILE = {
        0: { x: 0,    scale: 1,    opacity: 1,    z: 5 },
        1: { x: 95,   scale: 0.55, opacity: 0.5,  z: 4 },
        "-1": { x: -95, scale: 0.55, opacity: 0.5, z: 4 },
        2: { x: 150,  scale: 0.3,  opacity: 0.15, z: 3 },
        "-2": { x: -150, scale: 0.3, opacity: 0.15, z: 3 }
      };

      const mobileMedia = window.matchMedia("(max-width: 700px)");
      function getCurrentLayout() {
        return mobileMedia.matches ? WHEEL_LAYOUT_MOBILE : WHEEL_LAYOUT_DESKTOP;
      }

      // Abstand der Pfeile von der Mitte (nur fuer Desktop relevant -
      // auf Mobile werden die Pfeile per CSS fest an den Rand gesetzt).
      const OUTER = WHEEL_LAYOUT_DESKTOP[2];
      const ITEM_BASE_WIDTH = 220;
      const ARROW_GAP = 22;
      const ARROW_OFFSET = OUTER.x + (ITEM_BASE_WIDTH * OUTER.scale) / 2 + ARROW_GAP;

      // Sammelt die render()-Funktionen aller Jahres-Wheels, damit beim
      // Wechsel zwischen Mobile-/Desktop-Layout alle neu gezeichnet werden.
      const allWheelRenders = [];

      /* ---------- Touch-Swipe fuer Wheel & Lightbox ---------- */
      function attachSwipe(el, onSwipeLeft, onSwipeRight) {
        let startX = 0;
        let startY = 0;
        let deltaX = 0;
        let deltaY = 0;
        let tracking = false;
        let didSwipe = false;
        const THRESHOLD = 40;

        el.addEventListener("touchstart", (e) => {
          const t = e.touches[0];
          startX = t.clientX;
          startY = t.clientY;
          deltaX = 0;
          deltaY = 0;
          tracking = true;
          didSwipe = false;
        }, { passive: true });

        el.addEventListener("touchmove", (e) => {
          if (!tracking) return;
          const t = e.touches[0];
          deltaX = t.clientX - startX;
          deltaY = t.clientY - startY;
        }, { passive: true });

        el.addEventListener("touchend", () => {
          if (!tracking) return;
          tracking = false;
          if (Math.abs(deltaX) > THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY)) {
            didSwipe = true;
            if (deltaX < 0) onSwipeLeft(); else onSwipeRight();
          }
        });

        // Verhindert, dass ein Swipe zusaetzlich als Klick auf ein
        // Bild gewertet wird (sonst wuerde z.B. die Lightbox ungewollt
        // aufgehen oder das falsche Bild zentriert werden).
        el.addEventListener("click", (e) => {
          if (didSwipe) {
            e.stopPropagation();
            e.preventDefault();
            didSwipe = false;
          }
        }, true);
      }

      function buildWheel(yearData, yearIndex) {
        const block = document.createElement("div");
        block.className = "year-block";

        const label = document.createElement("h2");
        label.className = "year-label";
        label.textContent = yearData.year;
        block.appendChild(label);

        const sub = document.createElement("p");
        sub.className = "year-sub";
        sub.textContent = yearData.images.length + " fotos";
        block.appendChild(sub);

        const wheel = document.createElement("div");
        wheel.className = "wheel";
        wheel.style.setProperty("--arrow-offset", ARROW_OFFSET + "px");

        const track = document.createElement("div");
        track.className = "wheel-track";
        wheel.appendChild(track);

        const prevBtn = document.createElement("button");
        prevBtn.className = "wheel-arrow wheel-arrow-prev";
        prevBtn.setAttribute("aria-label", "Vorheriges Foto");
        prevBtn.innerHTML = "&#8249;";
        wheel.appendChild(prevBtn);

        const nextBtn = document.createElement("button");
        nextBtn.className = "wheel-arrow wheel-arrow-next";
        nextBtn.setAttribute("aria-label", "Naechstes Foto");
        nextBtn.innerHTML = "&#8250;";
        wheel.appendChild(nextBtn);

        block.appendChild(wheel);

        let centerIndex = 0;
        const total = yearData.images.length;

        function setCenter(i) {
          centerIndex = ((i % total) + total) % total;
          render();
        }

        function render() {
          track.innerHTML = "";
          for (let i = 0; i < total; i++) {
            // kuerzeste Distanz auf dem Ring berechnen
            let diff = i - centerIndex;
            if (diff > total / 2) diff -= total;
            if (diff < -total / 2) diff += total;

            if (Math.abs(diff) > 2) continue; // nur +-2 Nachbarn rendern

            const layout = getCurrentLayout()[diff];
            const item = document.createElement("div");
            item.className = "wheel-item" + (diff === 0 ? " is-center" : "");
            item.style.transform =
              "translate(-50%, -50%) translateX(" + layout.x + "px) scale(" + layout.scale + ")";
            item.style.opacity = layout.opacity;
            item.style.zIndex = layout.z;

            const img = document.createElement("img");
            img.src = yearData.images[i];
            img.alt = yearData.year + " Foto " + (i + 1);
            item.appendChild(img);

            item.addEventListener("click", () => {
              if (diff === 0) {
                openLightbox(yearData, i, setCenter);
              } else {
                setCenter(i);
              }
            });

            track.appendChild(item);
          }
        }

        prevBtn.addEventListener("click", () => setCenter(centerIndex - 1));
        nextBtn.addEventListener("click", () => setCenter(centerIndex + 1));

        // Per Hand nach links wischen = naechstes Bild, nach rechts wischen = voriges Bild.
        attachSwipe(wheel, () => setCenter(centerIndex + 1), () => setCenter(centerIndex - 1));

        allWheelRenders.push(render);
        render();
        return block;
      }

      GALLERY_DATA.forEach((yearData, idx) => {
        container.appendChild(buildWheel(yearData, idx));
      });

      // Beim Ueberschreiten der 700px-Grenze (z.B. Handydrehung, Resize)
      // alle Wheels mit dem passenden Layout neu zeichnen.
      mobileMedia.addEventListener("change", () => {
        allWheelRenders.forEach((renderFn) => renderFn());
      });

      // Swipe auch in der Lightbox erlauben.
      attachSwipe(lightbox, () => stepLightbox(1), () => stepLightbox(-1));
    </script>
  </body>
</html>
